  # ════════════════════════════════════════════
  # CORRESPONDENCE
  # ════════════════════════════════════════════

  /contacts/OpAddContact/{TTWOS_ID}:
    post:
      operationId: addContact
      summary: Add a note or contact message to a TTWOS ticket
      description: |
        Posts a note from Freshservice into a TTWOS ticket. Also used to
        send informational messages to TTWOS for Movius-internal status
        transitions that have no direct TTWOS status equivalent
        (Engineering Review, Awaiting Fix).

        Use cases: UC14, UC16, FS status 7 (Engineering Review), FS status 8 (Awaiting Fix)
      tags:
        - Correspondence
      parameters:
        - name: TTWOS_ID
          in: path
          required: true
          description: TTWOS ticket identifier
          schema:
            type: string
            maxLength: 17
            example: "INC000001234567"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpAddContactRequest'
            examples:
              incidentUpdate:
                summary: Standard note forwarded from Freshservice
                value:
                  ContactMessage: "Customer has provided additional details for investigation."
                  ContactMedium: "Interface"
                  ContactSubject: "Incident Update"
              engineeringReview:
                summary: Movius Engineering escalation notification
                value:
                  ContactMessage: "Incident has been escalated to Movius Engineering for review."
                  ContactMedium: "Interface"
                  ContactSubject: "Movius Engineering Review"
              awaitingFix:
                summary: Movius Engineering fix required notification
                value:
                  ContactMessage: "Movius Engineering has determined a fix is required."
                  ContactMedium: "Interface"
                  ContactSubject: "Fix Required"
      responses:
        "200":
          description: Contact note added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "201":
          description: Contact note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Invalid or missing request body fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — ⚠️ auth mechanism TBD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/OpAddAttachment/{TTWOS_ID}/{AttachmentName}:
    post:
      operationId: addAttachment
      summary: Upload an attachment to a TTWOS ticket
      description: |
        Uploads a file from Freshservice to a TTWOS ticket.
        Called once per file after OpAddContact when the Freshservice note
        includes attachments. Loop through all attachment files — one API
        call per file.

        Use case: UC16
      tags:
        - Correspondence
      parameters:
        - name: TTWOS_ID
          in: path
          required: true
          description: TTWOS ticket identifier
          schema:
            type: string
            maxLength: 17
            example: "INC000001234567"
        - name: AttachmentName
          in: path
          required: true
          description: File name of the attachment being uploaded
          schema:
            type: string
            maxLength: 255
            example: "error_screenshot.png"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpAddAttachmentRequest'
          multipart/form-data:
            schema:
              type: object
              properties:
                AttachmentData:
                  type: string
                  format: binary
                  description: Binary content of the file being uploaded
      responses:
        "200":
          description: Attachment uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized — ⚠️ auth mechanism TBD
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "413":
          description: Attachment file size too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
